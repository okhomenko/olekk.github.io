name: SEO Generation

on:
  push:
    branches:
      - main
      - seo-foundation
  pull_request:

jobs:
  generate-seo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate SEO artifacts
        run: node scripts/generate-seo.mjs

      - name: Upload SEO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seo-artifacts
          path: |
            sitemap.xml
            feed.xml
            llms.txt
